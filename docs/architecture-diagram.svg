<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 780" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#22c55e"/>
    </marker>
    <linearGradient id="client-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="supabase-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="vercel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f4f4f5"/>
    </linearGradient>
    <linearGradient id="external-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
    <filter id="shadow-light" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="780" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">MediBook — System Architecture Diagram</text>
  <line x1="240" y1="46" x2="720" y2="46" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Layer labels -->
  <text x="30" y="82" font-size="12" font-weight="bold" fill="#64748b" text-transform="uppercase">Presentation Layer</text>
  <line x1="30" y1="86" x2="160" y2="86" stroke="#94a3b8" stroke-width="2"/>

  <!-- ==================== CLIENT BROWSER ==================== -->
  <rect x="230" y="64" width="500" height="200" rx="10" fill="url(#client-grad)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="230" y="64" width="500" height="32" rx="10" fill="#3b82f6"/>
  <rect x="230" y="82" width="500" height="14" fill="#3b82f6"/>
  <text x="480" y="85" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Client Browser — React 19 SPA</text>

  <!-- Sub components in client -->
  <rect x="256" y="110" width="220" height="44" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="366" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">React Router v7</text>
  <text x="366" y="143" text-anchor="middle" font-size="10" fill="#64748b">Lazy-loaded pages, code splitting</text>

  <rect x="256" y="164" width="220" height="44" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="366" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">React Contexts</text>
  <text x="366" y="197" text-anchor="middle" font-size="10" fill="#64748b">Auth · UI · Language · Theme</text>

  <rect x="504" y="110" width="200" height="98" rx="6" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="604" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Supabase JS Client</text>
  <text x="604" y="148" text-anchor="middle" font-size="10" fill="#64748b">Direct DB queries</text>
  <text x="604" y="164" text-anchor="middle" font-size="10" fill="#64748b">Auth sessions</text>
  <text x="604" y="180" text-anchor="middle" font-size="10" fill="#64748b">RLS-enforced access</text>
  <text x="604" y="196" text-anchor="middle" font-size="10" fill="#64748b">Real-time subscriptions</text>

  <!-- Arrow from Client down -->
  <line x1="480" y1="264" x2="480" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer labels -->
  <text x="30" y="310" font-size="12" font-weight="bold" fill="#64748b">API &amp; Data Layer</text>
  <line x1="30" y1="314" x2="145" y2="314" stroke="#94a3b8" stroke-width="2"/>

  <!-- Branch lines from center -->
  <line x1="480" y1="300" x2="480" y2="315" stroke="#64748b" stroke-width="2"/>
  <line x1="220" y1="315" x2="740" y2="315" stroke="#64748b" stroke-width="2"/>
  <line x1="220" y1="315" x2="220" y2="340" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="315" x2="480" y2="340" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="315" x2="740" y2="340" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== SUPABASE PLATFORM ==================== -->
  <rect x="55" y="345" width="320" height="260" rx="10" fill="url(#supabase-grad)" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="55" y="345" width="320" height="32" rx="10" fill="#22c55e"/>
  <rect x="55" y="363" width="320" height="14" fill="#22c55e"/>
  <text x="215" y="366" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Supabase Platform (BaaS)</text>

  <!-- Supabase components -->
  <rect x="75" y="392" width="280" height="44" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="215" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Auth Service</text>
  <text x="215" y="425" text-anchor="middle" font-size="10" fill="#64748b">Email/password · Session management · Row-level security</text>

  <rect x="75" y="446" width="280" height="60" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="215" y="464" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">PostgreSQL Database</text>
  <text x="215" y="482" text-anchor="middle" font-size="10" fill="#64748b">departments · doctors · bookings · medical_records</text>
  <text x="215" y="497" text-anchor="middle" font-size="10" fill="#64748b">prescriptions · bills · triage_sessions · profiles</text>

  <rect x="75" y="516" width="280" height="36" rx="6" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="215" y="534" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">RLS Policies · Triggers · Migrations</text>

  <rect x="75" y="562" width="280" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1" stroke-dasharray="4,3" filter="url(#shadow-light)"/>
  <text x="215" y="581" text-anchor="middle" font-size="10" fill="#166534">Edge Functions (AI Triage)</text>

  <!-- ==================== VERCEL API FUNCTIONS ==================== -->
  <rect x="405" y="345" width="150" height="260" rx="10" fill="url(#vercel-grad)" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="405" y="345" width="150" height="32" rx="10" fill="#18181b"/>
  <rect x="405" y="363" width="150" height="14" fill="#18181b"/>
  <text x="480" y="366" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Vercel API</text>

  <rect x="420" y="392" width="120" height="36" rx="6" fill="#ffffff" stroke="#d4d4d8" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="480" y="412" text-anchor="middle" font-size="11" fill="#3b82f6">/api/paymob/*</text>
  <text x="480" y="424" text-anchor="middle" font-size="9" fill="#64748b">Auth · Orders · Keys</text>

  <rect x="420" y="438" width="120" height="36" rx="6" fill="#ffffff" stroke="#d4d4d8" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="480" y="458" text-anchor="middle" font-size="11" fill="#3b82f6">/api/resend/*</text>
  <text x="480" y="470" text-anchor="middle" font-size="9" fill="#64748b">Email notifications</text>

  <rect x="420" y="484" width="120" height="36" rx="6" fill="#ffffff" stroke="#d4d4d8" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="480" y="504" text-anchor="middle" font-size="11" fill="#3b82f6">/api/openrouter/*</text>
  <text x="480" y="516" text-anchor="middle" font-size="9" fill="#64748b">AI chat proxy</text>

  <text x="480" y="560" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">Serverless</text>
  <text x="480" y="574" text-anchor="middle" font-size="9" fill="#64748b" font-style="italic">Node.js runtime</text>

  <!-- ==================== EXTERNAL SERVICES ==================== -->
  <rect x="585" y="345" width="320" height="260" rx="10" fill="url(#external-grad)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <rect x="585" y="345" width="320" height="32" rx="10" fill="#f59e0b"/>
  <rect x="585" y="363" width="320" height="14" fill="#f59e0b"/>
  <text x="745" y="366" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">External Services</text>

  <!-- Resend -->
  <rect x="605" y="392" width="130" height="80" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="670" y="416" text-anchor="middle" font-size="14" font-weight="bold" fill="#dc2626">Resend</text>
  <text x="670" y="436" text-anchor="middle" font-size="10" fill="#64748b">Transactional</text>
  <text x="670" y="452" text-anchor="middle" font-size="10" fill="#64748b">Email Service</text>
  <text x="670" y="468" text-anchor="middle" font-size="9" fill="#94a3b8">Booking confirmations</text>
  <text x="670" y="468" text-anchor="middle" font-size="9" fill="#94a3b8">Reminders, Receipts</text>

  <!-- Paymob -->
  <rect x="755" y="392" width="130" height="80" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="820" y="416" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">Paymob</text>
  <text x="820" y="436" text-anchor="middle" font-size="10" fill="#64748b">Payment</text>
  <text x="820" y="452" text-anchor="middle" font-size="10" fill="#64748b">Gateway</text>
  <text x="820" y="468" text-anchor="middle" font-size="9" fill="#94a3b8">Cards, Iframe</text>

  <!-- OpenRouter -->
  <rect x="605" y="486" width="280" height="55" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow-light)"/>
  <text x="745" y="508" text-anchor="middle" font-size="14" font-weight="bold" fill="#7c3aed">OpenRouter</text>
  <text x="745" y="528" text-anchor="middle" font-size="10" fill="#64748b">AI API — Powers Salama AI Triage Chatbot</text>

  <text x="745" y="565" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">Integrations require API keys, never exposed to client</text>

  <!-- Layer label -->
  <text x="30" y="638" font-size="12" font-weight="bold" fill="#64748b">External Integrations Layer</text>
  <line x1="30" y1="642" x2="175" y2="642" stroke="#94a3b8" stroke-width="2"/>

  <!-- Bottom arrows from Vercel to External -->
  <line x1="480" y1="605" x2="480" y2="630" stroke="#64748b" stroke-width="1.5"/>
  <line x1="480" y1="630" x2="670" y2="630" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="630" x2="820" y2="630" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="630" x2="745" y2="630" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Supabase Edge Function direct arrow to OpenRouter -->
  <line x1="335" y1="570" x2="335" y2="640" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="335" y1="640" x2="745" y2="640" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="745" y1="640" x2="745" y2="545" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="540" y="652" text-anchor="middle" font-size="9" fill="#16a34a" font-style="italic">Supabase Edge Function</text>

  <!-- Legend -->
  <rect x="55" y="670" width="850" height="90" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="480" y="690" text-anchor="middle" font-size="11" font-weight="bold" fill="#64748b">Legend</text>
  <rect x="80" y="702" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="100" y="714" font-size="10" fill="#475569">Presentation Layer</text>
  <rect x="210" y="702" width="14" height="14" rx="3" fill="#22c55e"/>
  <text x="230" y="714" font-size="10" fill="#475569">Backend as a Service (Supabase)</text>
  <rect x="430" y="702" width="14" height="14" rx="3" fill="#18181b"/>
  <text x="450" y="714" font-size="10" fill="#475569">Serverless Functions (Vercel)</text>
  <rect x="650" y="702" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="670" y="714" font-size="10" fill="#475569">External Integrations</text>
  <text x="480" y="744" text-anchor="middle" font-size="9" fill="#94a3b8">Data flows from top to bottom. Client never holds API keys — all external calls are proxied.</text>
</svg>
