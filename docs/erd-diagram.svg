<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/>
    </marker>
    <marker id="crow-many" viewBox="0 0 14 10" refX="14" refY="5" markerWidth="9" markerHeight="7" orient="auto">
      <path d="M0 0 L6 5 L0 10 M6 0 L12 5 L6 10" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
    <marker id="crow-one" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#64748b" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#f8fafc" rx="8"/>
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">MediBook — Entity Relationship Diagram (ERD)</text>
  <line x1="350" y1="42" x2="850" y2="42" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- ============================================================ -->
  <!-- RBAC GROUP (Left Column)                                      -->
  <!-- ============================================================ -->

  <!-- roles -->
  <g transform="translate(50, 70)">
    <rect width="200" height="95" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <rect width="200" height="28" rx="8" fill="#3b82f6"/><rect y="20" width="200" height="8" fill="#3b82f6"/>
    <text x="100" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">roles</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#1e40af">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (SERIAL)</text>
    <text x="10" y="62" font-size="10" fill="#475569">name (UNIQUE)</text>
    <text x="10" y="78" font-size="10" fill="#475569">level, parent_id</text>
    <text x="10" y="92" font-size="9" fill="#94a3b8">↳ FK → roles(parent_id)</text>
  </g>

  <!-- permissions -->
  <g transform="translate(50, 195)">
    <rect width="200" height="95" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <rect width="200" height="28" rx="8" fill="#3b82f6"/><rect y="20" width="200" height="8" fill="#3b82f6"/>
    <text x="100" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">permissions</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#1e40af">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (SERIAL)</text>
    <text x="10" y="62" font-size="10" fill="#475569">name (UNIQUE)</text>
    <text x="10" y="78" font-size="10" fill="#475569">resource . action . scope</text>
  </g>

  <!-- role_permissions -->
  <g transform="translate(50, 320)">
    <rect width="200" height="70" rx="8" fill="#f0f9ff" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="200" height="26" rx="8" fill="#60a5fa"/><rect y="18" width="200" height="8" fill="#60a5fa"/>
    <text x="100" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">role_permissions</text>
    <text x="10" y="44" font-size="10" fill="#334155">role_id . permission_id</text>
    <text x="10" y="62" font-size="9" fill="#94a3b8">valid_from, valid_until</text>
  </g>

  <!-- ============================================================ -->
  <!-- CORE GROUP (Center-Left)                                     -->
  <!-- ============================================================ -->

  <!-- profiles -->
  <g transform="translate(300, 70)">
    <rect width="220" height="110" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <rect width="220" height="28" rx="8" fill="#16a34a"/><rect y="20" width="220" height="8" fill="#16a34a"/>
    <text x="110" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">profiles</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#166534">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (UUID)</text>
    <text x="10" y="62" font-size="10" fill="#475569">full_name, phone</text>
    <text x="10" y="78" font-size="10" fill="#475569">role_id</text>
    <text x="10" y="94" font-size="10" fill="#475569">department_id</text>
    <text x="10" y="108" font-size="9" fill="#94a3b8">user_id (FK → auth.users)</text>
  </g>

  <!-- departments -->
  <g transform="translate(300, 220)">
    <rect width="220" height="110" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <rect width="220" height="28" rx="8" fill="#16a34a"/><rect y="20" width="220" height="8" fill="#16a34a"/>
    <text x="110" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">departments</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#166534">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (SERIAL)</text>
    <text x="10" y="62" font-size="10" fill="#475569">name_en, name_ar</text>
    <text x="10" y="78" font-size="10" fill="#475569">max_daily, is_open</text>
    <text x="10" y="94" font-size="10" fill="#475569">head_doctor_id</text>
    <text x="10" y="108" font-size="9" fill="#94a3b8">↳ FK → doctors(id)</text>
  </g>

  <!-- ============================================================ -->
  <!-- MEDICAL GROUP (Center-Right)                                   -->
  <!-- ============================================================ -->

  <!-- doctors -->
  <g transform="translate(580, 70)">
    <rect width="230" height="110" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <rect width="230" height="28" rx="8" fill="#d97706"/><rect y="20" width="230" height="8" fill="#d97706"/>
    <text x="115" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">doctors</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#92400e">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (SERIAL)</text>
    <text x="10" y="62" font-size="10" fill="#475569">name, type</text>
    <text x="10" y="78" font-size="10" fill="#475569">department_id</text>
    <text x="10" y="94" font-size="10" fill="#475569">user_id</text>
    <text x="10" y="108" font-size="9" fill="#94a3b8">working_days, slots, is_active</text>
  </g>

  <!-- bookings -->
  <g transform="translate(580, 220)">
    <rect width="230" height="140" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <rect width="230" height="28" rx="8" fill="#d97706"/><rect y="20" width="230" height="8" fill="#d97706"/>
    <text x="115" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">bookings</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#92400e">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (UUID)</text>
    <text x="10" y="62" font-size="10" fill="#475569">booking_ref (UNIQUE)</text>
    <text x="10" y="78" font-size="10" fill="#475569">patient_name, phone</text>
    <text x="10" y="94" font-size="10" fill="#475569">user_id</text>
    <text x="10" y="110" font-size="10" fill="#475569">doctor_id</text>
    <text x="10" y="126" font-size="10" fill="#475569">department_id</text>
    <text x="10" y="138" font-size="9" fill="#94a3b8">booking_date, slot_time, status</text>
  </g>

  <!-- medical_records -->
  <g transform="translate(580, 400)">
    <rect width="230" height="125" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <rect width="230" height="28" rx="8" fill="#d97706"/><rect y="20" width="230" height="8" fill="#d97706"/>
    <text x="115" y="19" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">medical_records</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#92400e">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (UUID)</text>
    <text x="10" y="62" font-size="10" fill="#475569">patient_name, phone</text>
    <text x="10" y="78" font-size="10" fill="#475569">doctor_id, department_id</text>
    <text x="10" y="94" font-size="10" fill="#475569">booking_id</text>
    <text x="10" y="110" font-size="10" fill="#475569">diagnosis, notes</text>
    <text x="10" y="124" font-size="9" fill="#94a3b8">vitals (JSONB)</text>
  </g>

  <!-- prescriptions -->
  <g transform="translate(580, 560)">
    <rect width="230" height="80" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="230" height="26" rx="8" fill="#f59e0b"/><rect y="18" width="230" height="8" fill="#f59e0b"/>
    <text x="115" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">prescriptions</text>
    <text x="10" y="44" font-size="10" font-weight="bold" fill="#92400e">PK</text><text x="32" y="44" font-size="10" fill="#334155">id (UUID)</text>
    <text x="10" y="60" font-size="10" fill="#475569">medication_name, dosage</text>
    <text x="10" y="76" font-size="10" fill="#475569">frequency, duration</text>
  </g>

  <!-- bills -->
  <g transform="translate(580, 680)">
    <rect width="230" height="125" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <rect width="230" height="28" rx="8" fill="#d97706"/><rect y="20" width="230" height="8" fill="#d97706"/>
    <text x="115" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">bills</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#92400e">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (UUID)</text>
    <text x="10" y="62" font-size="10" fill="#475569">invoice_number (UNIQUE)</text>
    <text x="10" y="78" font-size="10" fill="#475569">patient_name, phone</text>
    <text x="10" y="94" font-size="10" fill="#475569">subtotal, tax, total</text>
    <text x="10" y="110" font-size="10" fill="#475569">payment_status</text>
    <text x="10" y="124" font-size="9" fill="#94a3b8">medical_record_id, booking_id</text>
  </g>

  <!-- ============================================================ -->
  <!-- SUPPORTING GROUP (Right Column)                                -->
  <!-- ============================================================ -->

  <!-- triage_sessions -->
  <g transform="translate(870, 70)">
    <rect width="240" height="95" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <rect width="240" height="28" rx="8" fill="#7c3aed"/><rect y="20" width="240" height="8" fill="#7c3aed"/>
    <text x="120" y="19" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">triage_sessions</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#6b21a8">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (UUID)</text>
    <text x="10" y="62" font-size="10" fill="#475569">messages (JSONB)</text>
    <text x="10" y="78" font-size="10" fill="#475569">severity</text>
    <text x="10" y="92" font-size="9" fill="#94a3b8">user_id, department_id</text>
  </g>

  <!-- notification_logs -->
  <g transform="translate(870, 195)">
    <rect width="240" height="110" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <rect width="240" height="28" rx="8" fill="#7c3aed"/><rect y="20" width="240" height="8" fill="#7c3aed"/>
    <text x="120" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">notification_logs</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#6b21a8">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (UUID)</text>
    <text x="10" y="62" font-size="10" fill="#475569">recipient_email</text>
    <text x="10" y="78" font-size="10" fill="#475569">type, status</text>
    <text x="10" y="94" font-size="10" fill="#475569">error_message</text>
    <text x="10" y="108" font-size="9" fill="#94a3b8">booking_id</text>
  </g>

  <!-- audit_logs -->
  <g transform="translate(870, 340)">
    <rect width="240" height="110" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <rect width="240" height="28" rx="8" fill="#7c3aed"/><rect y="20" width="240" height="8" fill="#7c3aed"/>
    <text x="120" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">audit_logs</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#6b21a8">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (SERIAL)</text>
    <text x="10" y="62" font-size="10" fill="#475569">action, model</text>
    <text x="10" y="78" font-size="10" fill="#475569">old_values / new_values</text>
    <text x="10" y="94" font-size="10" fill="#475569">ip_address, user_agent</text>
    <text x="10" y="108" font-size="9" fill="#94a3b8">user_id</text>
  </g>

  <!-- user_role_history -->
  <g transform="translate(870, 490)">
    <rect width="240" height="95" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <rect width="240" height="28" rx="8" fill="#7c3aed"/><rect y="20" width="240" height="8" fill="#7c3aed"/>
    <text x="120" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">user_role_history</text>
    <text x="10" y="46" font-size="10" font-weight="bold" fill="#6b21a8">PK</text><text x="32" y="46" font-size="10" fill="#334155">id (SERIAL)</text>
    <text x="10" y="62" font-size="10" fill="#475569">old_role, new_role</text>
    <text x="10" y="78" font-size="10" fill="#475569">reason</text>
    <text x="10" y="92" font-size="9" fill="#94a3b8">user_id, assigned_by</text>
  </g>

  <!-- role_conflicts -->
  <g transform="translate(870, 615)">
    <rect width="240" height="55" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="240" height="26" rx="8" fill="#7c3aed"/><rect y="18" width="240" height="8" fill="#7c3aed"/>
    <text x="120" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">role_conflicts</text>
    <text x="10" y="44" font-size="10" fill="#475569">role_id . conflicting_role_id</text>
  </g>

  <!-- ============================================================ -->
  <!-- RELATIONSHIP LINES                                           -->
  <!-- ============================================================ -->

  <!-- roles 1:N → role_permissions -->
  <path d="M 250 118 L 270 118 L 270 355" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="240" font-size="10" fill="#3b82f6" font-weight="bold">1</text>

  <!-- permissions 1:N → role_permissions -->
  <path d="M 250 243 L 270 243 L 270 355" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="300" font-size="10" fill="#3b82f6" font-weight="bold">1</text>

  <!-- roles 1:N → profiles -->
  <path d="M 250 135 L 275 135 L 275 160 L 300 160" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="275" y="152" font-size="9" fill="#16a34a">1</text>

  <!-- departments 1:N → profiles -->
  <path d="M 410 220 L 410 200 L 410 180" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="403" y="205" font-size="9" fill="#16a34a">1</text>

  <!-- departments 1:N → doctors -->
  <path d="M 520 265 L 550 265 L 550 145 L 580 145" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="210" font-size="9" fill="#d97706">1</text>

  <!-- doctors 1:1 → departments(head_doctor) -->
  <path d="M 695 110 L 695 85 L 520 85 L 520 230" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="610" y="80" font-size="8" fill="#d97706">head (1:1)</text>

  <!-- auth.users 1:1 → profiles -->
  <path d="M 410 85 L 390 85 L 370 85" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="370" y="102" font-size="9" fill="#64748b">1:1 via user_id</text>

  <!-- doctors 1:N → bookings -->
  <path d="M 810 155 L 830 155 L 830 290 L 810 290" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="825" y="225" font-size="9" fill="#d97706">1</text>

  <!-- departments 1:N → bookings -->
  <path d="M 520 280 L 550 280 L 550 340 L 580 340" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="315" font-size="9" fill="#d97706">1</text>

  <!-- bookings 1:1 → medical_records -->
  <path d="M 810 350 L 830 350 L 830 460 L 810 460" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="825" y="408" font-size="9" fill="#d97706">1</text>

  <!-- medical_records 1:N → prescriptions -->
  <path d="M 695 490 L 695 520 L 580 520" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <path d="M 580 520 L 580 565" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="625" y="515" font-size="9" fill="#d97706">1</text>

  <!-- medical_records 1:1 → bills -->
  <path d="M 695 525 L 670 525 L 670 780 L 580 780" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <path d="M 580 780 L 580 750" fill="none" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="620" y="650" font-size="9" fill="#d97706">1</text>

  <!-- bookings 1:1 → bills -->
  <path d="M 810 380 L 840 380 L 840 740 L 810 740" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- bookings 1:N → notification_logs -->
  <path d="M 810 330 L 840 330 L 840 250 L 870 250" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="845" y="295" font-size="9" fill="#7c3aed">1</text>

  <!-- departments 1:N → triage_sessions -->
  <path d="M 520 265 L 850 265 L 850 125 L 870 125" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- roles 1:N → user_role_history -->
  <path d="M 250 140 L 860 140 L 860 545" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- roles → role_conflicts -->
  <path d="M 250 140 L 860 140 L 860 640" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- LEGEND                                                        -->
  <!-- ============================================================ -->
  <g transform="translate(50, 810)">
    <rect width="1100" height="70" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <rect x="20" y="10" width="14" height="14" rx="3" fill="#3b82f6"/>
    <text x="40" y="22" font-size="10" fill="#475569">RBAC &amp; Security</text>
    <rect x="160" y="10" width="14" height="14" rx="3" fill="#16a34a"/>
    <text x="180" y="22" font-size="10" fill="#475569">Core Data</text>
    <rect x="280" y="10" width="14" height="14" rx="3" fill="#d97706"/>
    <text x="300" y="22" font-size="10" fill="#475569">Medical &amp; Financial</text>
    <rect x="430" y="10" width="14" height="14" rx="3" fill="#7c3aed"/>
    <text x="450" y="22" font-size="10" fill="#475569">Supporting &amp; Audit</text>
    <text x="20" y="44" font-size="10" fill="#64748b">Solid arrow = Direct FK relationship</text>
    <text x="320" y="44" font-size="10" fill="#64748b">Dashed arrow = Indirect FK</text>
    <text x="560" y="44" font-size="10" fill="#64748b"><tspan font-weight="bold">1</tspan> = One, <tspan font-weight="bold">N</tspan> = Many</text>
    <text x="740" y="44" font-size="10" fill="#64748b">PK = Primary Key, FK = Foreign Key</text>
  </g>
</svg>
